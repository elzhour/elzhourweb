[build]
  command = "pnpm install && BASE_PATH=/ PORT=3000 pnpm --filter @workspace/zohour-handball run build"
  publish = "artifacts/zohour-handball/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"
  PORT = "3000"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/send-push"
  to = "/.netlify/functions/send-push"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
